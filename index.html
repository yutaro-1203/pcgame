<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Hydroneer風 完全修正版</title>

<style>
body{margin:0;font-family:sans-serif;background:#1e2a33;color:white;}
#top{position:fixed;width:100%;background:#0008;padding:10px;display:flex;gap:10px;}
button{padding:8px;border:none;border-radius:6px;cursor:pointer;}
.zone{display:none;padding-top:60px;text-align:center;}
.active{display:block;}
.grid{display:grid;grid-template-columns:repeat(20,20px);gap:2px;justify-content:center;margin-top:20px;}
.cell{width:20px;height:20px;background:#6b4f2a;cursor:pointer;}
.locked{opacity:0.3;}
</style>
</head>

<body>

<div id="top">
<button onclick="switchZone(1)">⛏ 採掘</button>
<button onclick="switchZone(2)">🪣 洗浄</button>
<button onclick="switchZone(3)">🏭 加工</button>
<button onclick="switchZone(4)">💰 売却</button>
</div>

<!-- 採掘 -->
<div id="zone1" class="zone active">
<h2>採掘</h2>
土: <span id="dirt"></span>
<div id="mine" class="grid"></div>
</div>

<!-- 洗浄 -->
<div id="zone2" class="zone">
<h2>洗浄</h2>
土: <span id="dirt2"></span>
<button onclick="pan()">パンニング（土3）</button>

<h3>金属</h3>
鉄:<span id="iron"></span>
金:<span id="gold"></span>
クロチウム:<span id="clout"></span>
コアストーン:<span id="core"></span>

<h3>宝石原石</h3>
エメ:<span id="emeraldOre"></span>
サファ:<span id="sapphireOre"></span>
ルビー:<span id="rubyOre"></span>
オニキス:<span id="onyxOre"></span>
</div>

<!-- 加工 -->
<div id="zone3" class="zone">
<h2>加工</h2>

<button onclick="unlockGem()">宝石加工解放（$100）</button>

<div id="gemArea" class="locked">
<button onclick="makeGem('emerald')">エメラルド</button>
<button onclick="makeGem('sapphire')">サファイア</button>
<button onclick="makeGem('ruby')">ルビー</button>
<button onclick="makeGem('onyx')">オニキス</button>
</div>

<h3>宝石</h3>
エメ:<span id="emerald"></span>
サファ:<span id="sapphire"></span>
ルビー:<span id="ruby"></span>
オニキス:<span id="onyx"></span>
</div>

<!-- 売却 -->
<div id="zone4" class="zone">
<h2>売却</h2>
<button onclick="sellAll()">全部売る</button>
💰:<span id="money"></span>
</div>

<script>

// ===== データ（ここが超重要）=====
let data = {
    dirt:0,
    iron:0,
    gold:0,
    clout:0,
    core:0,
    emeraldOre:0,
    sapphireOre:0,
    rubyOre:0,
    onyxOre:0,
    emerald:0,
    sapphire:0,
    ruby:0,
    onyx:0,
    money:0
};

let gemUnlocked = false;

// ===== ゾーン切替 =====
function switchZone(n){
    for(let i=1;i<=4;i++){
        document.getElementById("zone"+i).classList.remove("active");
    }
    document.getElementById("zone"+n).classList.add("active");
}

// ===== 採掘 =====
let mine=document.getElementById("mine");

for(let i=0;i<200;i++){
    let div=document.createElement("div");
    div.className="cell";
    div.onclick=()=>{
        data.dirt++;
        update();
    };
    mine.appendChild(div);
}

// ===== 洗浄 =====
function pan(){
    if(data.dirt>=3){
        data.dirt-=3;

        // 金属
        let r=Math.random();
        if(r<0.01) data.core++;
        else if(r<0.05) data.clout++;
        else if(r<0.2) data.gold++;
        else data.iron++;

        // 宝石（独立）
        let g=Math.random();
        if(g<0.02) data.onyxOre++;
        else if(g<0.05) data.rubyOre++;
        else if(g<0.1) data.sapphireOre++;
        else if(g<0.2) data.emeraldOre++;
    }
    update();
}

// ===== 解放 =====
function unlockGem(){
    if(data.money>=100){
        data.money-=100;
        gemUnlocked=true;
        document.getElementById("gemArea").classList.remove("locked");
    }
}

// ===== 宝石加工 =====
function makeGem(type){
    if(!gemUnlocked) return;

    if(type==="emerald" && data.emeraldOre>=1){
        data.emeraldOre--; data.emerald++;
    }
    if(type==="sapphire" && data.sapphireOre>=1){
        data.sapphireOre--; data.sapphire++;
    }
    if(type==="ruby" && data.rubyOre>=1){
        data.rubyOre--; data.ruby++;
    }
    if(type==="onyx" && data.onyxOre>=1){
        data.onyxOre--; data.onyx++;
    }

    update();
}

// ===== 売却 =====
function sellAll(){
    data.money += data.iron*5;
    data.money += data.gold*10;
    data.money += data.clout*25;
    data.money += data.core*50;

    data.money += data.emerald*15;
    data.money += data.sapphire*25;
    data.money += data.ruby*40;
    data.money += data.onyx*70;

    data.iron=0;
    data.gold=0;
    data.clout=0;
    data.core=0;
    data.emerald=0;
    data.sapphire=0;
    data.ruby=0;
    data.onyx=0;

    update();
}

// ===== 更新（完全修正版）=====
function update(){
    for(let key in data){
        let el=document.getElementById(key);
        if(el){
            el.textContent=data[key];
        }
    }
    document.getElementById("dirt2").textContent=data.dirt;
}

update();

</script>

</body>
</html>
