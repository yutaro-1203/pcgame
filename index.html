<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Hydroneer風 発展ゲーム++</title>

<style>
body{margin:0;font-family:sans-serif;background:#1e2a33;color:white;}
#top{position:fixed;width:100%;background:#0008;padding:10px;display:flex;gap:10px;}
button{padding:8px;border:none;border-radius:6px;cursor:pointer;}
.zone{display:none;padding-top:60px;text-align:center;}
.active{display:block;}
.grid{display:grid;grid-template-columns:repeat(20,20px);gap:2px;justify-content:center;margin-top:20px;}
.cell{width:20px;height:20px;background:#6b4f2a;cursor:pointer;}
.locked{opacity:0.3;}
</style>
</head>

<body>

<div id="top">
<button onclick="switchZone(1)">⛏ 採掘</button>
<button onclick="switchZone(2)">🪣 洗浄</button>
<button onclick="switchZone(3)">🏭 加工</button>
<button onclick="switchZone(4)">💰 売却</button>
</div>

<!-- 採掘 -->
<div id="zone1" class="zone active">
<h2>採掘</h2>
土: <span id="dirt"></span>
<div id="mine" class="grid"></div>
</div>

<!-- 洗浄 -->
<div id="zone2" class="zone">
<h2>洗浄</h2>
土: <span id="dirt2"></span>
<button onclick="pan()">パンニング（土3）</button>

<h3>金属</h3>
鉄:<span id="iron"></span>
金:<span id="gold"></span>
クロチウム:<span id="clout"></span>
コアストーン:<span id="core"></span>

<h3>宝石原石</h3>
エメ:<span id="emeraldOre"></span>
サファ:<span id="sapphireOre"></span>
ルビー:<span id="rubyOre"></span>
オニキス:<span id="onyxOre"></span>
</div>

<!-- 加工 -->
<div id="zone3" class="zone">
<h2>加工</h2>

<button onclick="unlockGem()">宝石加工解放（$100）</button>

<div id="gemArea" class="locked">
<button onclick="makeGem('emerald')">エメラルド</button>
<button onclick="makeGem('sapphire')">サファイア</button>
<button onclick="makeGem('ruby')">ルビー</button>
<button onclick="makeGem('onyx')">オニキス</button>
</div>

<h3>宝石</h3>
エメ:<span id="emerald"></span>
サファ:<span id="sapphire"></span>
ルビー:<span id="ruby"></span>
オニキス:<span id="onyx"></span>

</div>

<!-- 売却 -->
<div id="zone4" class="zone">
<h2>売却</h2>

<button onclick="sellAll()">全部売る</button>

💰:<span id="money"></span>
</div>

<script>

// ===== データ =====
let dirt=0;
let money=0;

// 金属
let iron=0, gold=0, clout=0, core=0;

// 宝石原石
let emeraldOre=0, sapphireOre=0, rubyOre=0, onyxOre=0;

// 宝石
let emerald=0, sapphire=0, ruby=0, onyx=0;

let gemUnlocked=false;

// ===== ゾーン =====
function switchZone(n){
    for(let i=1;i<=4;i++) document.getElementById("zone"+i).classList.remove("active");
    document.getElementById("zone"+n).classList.add("active");
}

// ===== 採掘 =====
let mine=document.getElementById("mine");
for(let i=0;i<200;i++){
    let div=document.createElement("div");
    div.className="cell";
    div.onclick=()=>{ dirt++; update(); };
    mine.appendChild(div);
}

// ===== 洗浄 =====
function pan(){
    if(dirt>=3){
        dirt-=3;

        // 金属（レア順）
        let r=Math.random();
        if(r<0.01) core++;
        else if(r<0.05) clout++;
        else if(r<0.2) gold++;
        else iron++;

        // 宝石（独立抽選）
        let g=Math.random();
        if(g<0.02) onyxOre++;
        else if(g<0.05) rubyOre++;
        else if(g<0.1) sapphireOre++;
        else if(g<0.2) emeraldOre++;
    }
    update();
}

// ===== 解放 =====
function unlockGem(){
    if(money>=100){
        money-=100;
        gemUnlocked=true;
        document.getElementById("gemArea").classList.remove("locked");
    }
}

// ===== 宝石加工 =====
function makeGem(type){
    if(!gemUnlocked) return;

    if(type==="emerald" && emeraldOre>=1){ emeraldOre--; emerald++; }
    if(type==="sapphire" && sapphireOre>=1){ sapphireOre--; sapphire++; }
    if(type==="ruby" && rubyOre>=1){ rubyOre--; ruby++; }
    if(type==="onyx" && onyxOre>=1){ onyxOre--; onyx++; }

    update();
}

// ===== 売却 =====
function sellAll(){
    money += iron*5;
    money += gold*10;
    money += clout*25;
    money += core*50;

    money += emerald*15;
    money += sapphire*25;
    money += ruby*40;
    money += onyx*70;

    iron=gold=clout=core=0;
    emerald=sapphire=ruby=onyx=0;

    update();
}

// ===== 更新 =====
function update(){
    let ids=["dirt","dirt2","iron","gold","clout","core",
    "emeraldOre","sapphireOre","rubyOre","onyxOre",
    "emerald","sapphire","ruby","onyx","money"];

    ids.forEach(id=>{
        if(window[id]!==undefined){
            document.getElementById(id).textContent=window[id];
        }
    });
}

update();

</script>

</body>
</html>
