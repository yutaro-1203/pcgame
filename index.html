<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Hydroneer風 採掘シミュレーション</title>
<style>
body{margin:0;font-family:sans-serif;background:#1e2a33;color:#fff}
#ui{position:fixed;top:0;left:0;padding:10px;background:rgba(0,0,0,0.5)}
canvas{display:block}
button{margin:2px}
</style>
</head>
<body>

<div id="ui">
<button onclick="tool='dig'">⛏ 掘る</button>
<button onclick="tool='pan'">🪣 ふるい</button>
<button onclick="tool='sell'">💰 売る</button>
<div>所持金: <span id="money">0</span></div>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let gridSize=20;
let cols=Math.floor(canvas.width/gridSize);
let rows=Math.floor(canvas.height/gridSize);

let world=[];
for(let y=0;y<rows;y++){
 let row=[];
 for(let x=0;x<cols;x++){
  let depth=y;
  let type="dirt";
  if(Math.random()<depth/rows*0.2) type="gold";
  row.push({type:type});
 }
 world.push(row);
}

let tool="dig";
let money=0;
let inventory={dirt:0,gold:0};

canvas.addEventListener("click",e=>{
 let x=Math.floor(e.clientX/gridSize);
 let y=Math.floor(e.clientY/gridSize);
 if(!world[y]||!world[y][x]) return;

 let cell=world[y][x];

 if(tool==="dig"){
  inventory[cell.type]++;
  world[y][x]={type:"air"};
 }

 if(tool==="pan"){
  if(inventory.dirt>=3){
    inventory.dirt-=3;
    if(Math.random()<0.3) inventory.gold++;
  }
 }

 if(tool==="sell"){
  money+=inventory.gold*10;
  inventory.gold=0;
 }

 update();
});

function update(){
 document.getElementById("money").textContent=money;
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 for(let y=0;y<rows;y++){
  for(let x=0;x<cols;x++){
   let cell=world[y][x];
   if(cell.type==="dirt") ctx.fillStyle="#6b4f2a";
   else if(cell.type==="gold") ctx.fillStyle="#ffd700";
   else ctx.fillStyle="#222";
   ctx.fillRect(x*gridSize,y*gridSize,gridSize,gridSize);
  }
 }
 requestAnimationFrame(draw);
}

draw();
update();
</script>

</body>
</html>
