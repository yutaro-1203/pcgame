<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Hydroneer風 2ゾーンゲーム</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#1e2a33;
    color:white;
}

#top{
    position:fixed;
    width:100%;
    background:#0008;
    padding:10px;
    display:flex;
    gap:10px;
}

button{
    padding:8px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.zone{
    display:none;
    padding-top:60px;
    text-align:center;
}

.active{ display:block; }

.grid{
    display:grid;
    grid-template-columns:repeat(20,20px);
    gap:2px;
    justify-content:center;
    margin-top:20px;
}

.cell{
    width:20px;height:20px;
    background:#6b4f2a;
    cursor:pointer;
}

</style>
</head>

<body>

<div id="top">
<button onclick="switchZone(1)">⛏ 採掘ゾーン</button>
<button onclick="switchZone(2)">🪣 洗浄ゾーン</button>
</div>

<!-- ===== 採掘ゾーン ===== -->
<div id="zone1" class="zone active">
<h2>採掘ゾーン</h2>
<p>土の塊: <span id="dirt">0</span></p>

<div id="mine" class="grid"></div>

<button onclick="placeDrill()">⚙ ドリル設置（自動採掘）</button>
</div>

<!-- ===== 洗浄ゾーン ===== -->
<div id="zone2" class="zone">
<h2>洗浄ゾーン</h2>

<p>土の塊: <span id="dirt2">0</span></p>

<button onclick="pan()">🪣 パンニング（土3）</button>

<h3>鉱石</h3>
金: <span id="gold">0</span><br>
鉄: <span id="iron">0</span><br>
宝石: <span id="gem">0</span><br>

</div>

<script>

// ===== データ =====
let dirt=0;
let gold=0, iron=0, gem=0;

// ===== ゾーン切り替え =====
function switchZone(n){
    document.getElementById("zone1").classList.remove("active");
    document.getElementById("zone2").classList.remove("active");
    document.getElementById("zone"+n).classList.add("active");
}

// ===== 採掘グリッド =====
let mine=document.getElementById("mine");
let cells=[];

for(let i=0;i<200;i++){
    let div=document.createElement("div");
    div.className="cell";

    div.onclick=()=>{
        dirt++;
        update();
    };

    mine.appendChild(div);
    cells.push(div);
}

// ===== ドリル =====
let drills=[];

function placeDrill(){
    drills.push({timer:0});
}

// 自動採掘
setInterval(()=>{
    drills.forEach(d=>{
        d.timer++;
        if(d.timer>=30){ // 約3秒
            dirt++;
            d.timer=0;
        }
    });
    update();
},100);

// ===== パンニング =====
function pan(){
    if(dirt>=3){
        dirt-=3;

        let r=Math.random();
        if(r<0.5) gold++;
        else if(r<0.8) iron++;
        else gem++;
    }
    update();
}

// ===== 更新 =====
function update(){
    document.getElementById("dirt").textContent=dirt;
    document.getElementById("dirt2").textContent=dirt;
    document.getElementById("gold").textContent=gold;
    document.getElementById("iron").textContent=iron;
    document.getElementById("gem").textContent=gem;
}

update();

</script>

</body>
</html>
